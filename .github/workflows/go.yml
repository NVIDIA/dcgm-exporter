name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.24
        cache: true

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc

    - name: Build
      run: make binary

    - name: Lint
      run: make check-format

  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.24
        cache: true

    - name: Install build dependencies
      run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc

    - name: Generate mocks
      run: go generate ./...

    - name: Run per-pod collector unit tests
      run: go test -v -count=1 ./internal/pkg/collector/... -run TestProcessPodCollector

    - name: Run all short unit tests
      run: go test ./... -short -count=1
